name: Build Pacey for All Platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # Generate code and prepare source
  prepare-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Upload source artifacts
        uses: actions/upload-artifact@main
        with:
          name: pacey-source
          path: |
            .
            !.git
            !.github
          retention-days: 7

  # Build for Windows
  build-windows:
    needs: prepare-build
    runs-on: windows-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Download source artifacts
        uses: actions/download-artifact@main
        with:
          name: pacey-source
          path: .

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Windows executable
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-windows
          path: build/windows/x64/runner/Release/pacey.exe
          retention-days: 7

  # Build for macOS
  build-macos:
    needs: prepare-build
    runs-on: macos-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Download source artifacts
        uses: actions/download-artifact@main
        with:
          name: pacey-source
          path: .

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@master
        with:
          xcode-version: latest-stable

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create macOS zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r pacey-macos.zip pacey.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-macos
          path: build/macos/Build/Products/Release/pacey-macos.zip
          retention-days: 7

  # Build for Linux
  build-linux:
    needs: prepare-build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Install Linux dependencies
        run: |
          sudo apt-get update --fix-missing || true
          sudo apt-get install -y --fix-missing clang cmake ninja-build pkg-config libgtk-3-dev libpng-dev libjpeg-dev libtiff-dev fuse2 libfuse2 imagemagick || true
          # Fallback installation if some packages fail
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev imagemagick || sudo apt-get install -y clang cmake ninja-build pkg-config imagemagick

      - name: Cache AppImage tool
        uses: actions/cache@v3
        with:
          path: appimagetool-x86_64.AppImage
          key: appimagetool-${{ hashFiles('**/build.yml') }}
          restore-keys: appimagetool-

      - name: Download source artifacts
        uses: actions/download-artifact@main
        with:
          name: pacey-source
          path: .

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Linux executable
        run: flutter build linux --release

      - name: Create AppImage
        run: |
          # Download appimagetool if not cached
          if [ ! -f appimagetool-x86_64.AppImage ]; then
            wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
          fi
          
          # Extract AppImage to avoid FUSE issues
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool
          
          # Create AppDir structure
          mkdir -p AppImageDir/usr/bin
          mkdir -p AppImageDir/usr/share/applications
          mkdir -p AppImageDir/usr/share/icons/hicolor/256x256/apps
          
          # Copy application files
          cp -r build/linux/x64/release/bundle/* AppImageDir/usr/bin/
          
          # Create desktop file
          cat > AppImageDir/Pacey.desktop << EOF
          [Desktop Entry]
          Name=Pacey
          Comment=Energy pacing application
          Exec=Pacey
          Icon=Pacey
          Type=Application
          Categories=Utility;
          EOF
          
          # Create AppRun script
          cat > AppImageDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/Pacey" "$@"
          EOF
          chmod +x AppImageDir/AppRun
          
          # Create icon using ImageMagick (now pre-installed)
          convert -size 256x256 xc:blue -fill white -gravity center -pointsize 32 -annotate +0+0 "Pacey" AppImageDir/pacey.png || \
          # Fallback: create a simple colored square
          convert -size 256x256 xc:blue AppImageDir/pacey.png || \
          # Final fallback: copy AppRun as placeholder
          cp AppImageDir/AppRun AppImageDir/pacey.png
          
          # Build AppImage using extracted tool
          ./appimagetool/AppRun AppImageDir Pacey-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-linux-appimage
          path: Pacey-x86_64.AppImage
          retention-days: 7

  # Build for Android (APK)
  build-android:
    needs: prepare-build
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@main
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download source artifacts
        uses: actions/download-artifact@main
        with:
          name: pacey-source
          path: .

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Android APK
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            flutter build apk --debug --tree-shake-icons
          else
            flutter build apk --profile --tree-shake-icons --split-debug-info=build/debug-info
          fi

      - name: Rename Android APK
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            cd build/app/outputs/flutter-apk
            mv app-profile.apk pacey.apk
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-android
          path: |
            ${{ github.event_name == 'pull_request' && 'build/app/outputs/flutter-apk/app-debug.apk' || 'build/app/outputs/flutter-apk/pacey.apk' }}
          retention-days: 7

  # Build for iOS (only on macOS)
  build-ios:
    needs: prepare-build
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download source artifacts
        uses: actions/download-artifact@main
        with:
          name: pacey-source
          path: .

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@master
        with:
          xcode-version: latest-stable

      - name: Build iOS app
        run: flutter build ios --release --no-codesign

      - name: Rename iOS app
        run: |
          cd build/ios/iphoneos
          mv Runner.app Pacey.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-ios
          path: build/ios/iphoneos/Pacey.app
          retention-days: 7

  # Create release with all artifacts
  create-release:
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push nightly tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly -m "Nightly build"
          git push origin --force refs/tags/nightly

      - name: Download all artifacts
        uses: actions/download-artifact@main
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@master
        with:
          files: |
            artifacts/pacey-windows/pacey.exe
            artifacts/pacey-macos/pacey-macos.zip
            artifacts/pacey-linux-appimage/Pacey-x86_64.AppImage
            artifacts/pacey-android/pacey.apk
            artifacts/pacey-ios/Pacey.app
          generate_release_notes: true
          draft: false
          prerelease: true
          replace_existing_tag: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
