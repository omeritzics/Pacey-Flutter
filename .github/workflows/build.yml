name: Build Pacey for All Platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Build for Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Build Windows executable
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-windows
          path: build/windows/x64/runner/Release/energy_pacing.exe
          retention-days: 30

  # Build for macOS
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create macOS zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r pacey-macos.zip energy_pacing.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-macos
          path: build/macos/Build/Products/Release/pacey-macos.zip
          retention-days: 30

  # Build for Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update --fix-missing || true
          sudo apt-get install -y --fix-missing clang cmake ninja-build pkg-config libgtk-3-dev libpng-dev libjpeg-dev libtiff-dev || true
          # Fallback installation if some packages fail
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev || sudo apt-get install -y clang cmake ninja-build pkg-config 

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Build Linux executable
        run: flutter build linux --release

      - name: Create Linux tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar -czf pacey-linux.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-linux
          path: build/linux/x64/release/bundle/pacey-linux.tar.gz
          retention-days: 30

  # Build for Android (APK)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --debug

      - name: Upload Android artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # Build for iOS (only on macOS)
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter packages pub run build_runner build --delete-conflicting-outputs

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build iOS app
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@main
        with:
          name: pacey-ios
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  # Create release with all artifacts
  create-release:
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pacey-windows/energy_pacing.exe
            artifacts/pacey-macos/pacey-macos.zip
            artifacts/pacey-linux/pacey-linux.tar.gz
            artifacts/pacey-android/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
