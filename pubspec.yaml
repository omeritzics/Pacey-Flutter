name: pacey
description: "A simple energy management application for people with CFS/ME."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  dynamic_color: ^1.8.1
  fl_chart: ^1.2.0
  uuid: ^4.5.3
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  file_picker: ^12.0.0-beta.3
  share_plus: ^13.1.0
  http: ^1.6.0
  sqflite: ^2.4.3
  sqflite_common_ffi: ^2.4.2
  shared_preferences: ^2.5.5
  confetti: ^0.8.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  window_manager: ^0.5.1
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.3.0
  sqlite_crdt: ^3.0.4
  qr_flutter: ^4.1.0
  web_socket_channel: ^3.0.3
  mobile_scanner: ^7.2.0
  device_info_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    enabled: true
  windows:
    enabled: true
  image_path: "assets/images/icon_master_flat.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
