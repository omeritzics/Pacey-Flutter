name: pacey
description: "A simple energy management application for people with CFS/ME."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    enabled: true
  windows:
    enabled: true
  image_path: "assets/images/icon_master_flat.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  dynamic_color: ^1.8.1
  fl_chart: ^1.2.0
  uuid: ^4.5.3
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  file_picker: ^8.1.7
  share_plus: ^12.0.2
  http: ^1.6.0
  sqflite: ^2.4.2+1
  sqflite_common_ffi: ^2.4.0+3
  shared_preferences: ^2.5.5
  flutter_launcher_icons: ^0.14.4
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
